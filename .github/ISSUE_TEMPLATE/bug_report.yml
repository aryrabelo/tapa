name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Open a folder with '...'
        2. Double-click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14.5, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tapa version or commit
      placeholder: "e.g. 0.1.0 or a commit SHA"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, or a sample Markdown file that triggers it.
    validations:
      required: false
