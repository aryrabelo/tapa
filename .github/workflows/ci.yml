name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # The Tauri build script expects the frontend dist to exist.
      - run: npm ci
      - run: npm run build
      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-features

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Advisory only — surfaces known vulnerabilities without blocking merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit --file src-tauri/Cargo.lock

  size:
    name: Artifact size gate (macOS)
    runs-on: macos-latest
    # The dmg + app bundles carry the full binary (updater plugin included), so
    # the size gate needs no signing secret: the CI config override disables
    # updater-artifact signing. See scripts/check-size.mjs for the block-and-ask
    # rule. Only release.yml signs and emits latest.json.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build macOS bundles (dmg + app)
        run: npm run tauri build -- --bundles dmg,app --config '{"bundle":{"createUpdaterArtifacts":false}}'
      - name: Check artifact sizes against budget
        run: node scripts/check-size.mjs
